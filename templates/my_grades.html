<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Grades</title>

```
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #f8f5ff;
        min-height: 100vh;
        color: #333;
    }

    .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 60px;
        background-color: #e9ddff;
        border-bottom: 1px solid #d8c8f5;
    }

    .head h2 {
        color: #6b46c1;
        font-size: 28px;
    }

    .head span {
        color: #555;
        font-size: 16px;
    }

    .container {
        width: 90%;
        max-width: 900px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.08);
    }

    h1 {
        text-align: center;
        color: #6b46c1;
        margin-bottom: 25px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 8px;
    }

    th {
        background-color: #8b5cf6;
        color: white;
        padding: 12px;
    }

    td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    tr:hover {
        background-color: #f3eeff;
    }

    .back-btn {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        background-color: #8b5cf6;
        color: white;
        padding: 10px 18px;
        border-radius: 6px;
        transition: 0.3s;
    }

    .back-btn:hover {
        background-color: #7c3aed;
    }

    @media(max-width:768px) {

        .head {
            padding: 15px 20px;
        }

        .container {
            width: 95%;
            overflow-x: auto;
        }

        table {
            min-width: 500px;
        }
    }
</style>
```

</head>

<body>

```
<div class="head">
    <h2>SCMS</h2>
    <span>My Grades</span>
</div>

<div class="container">

    <h1>My Grades</h1>

    <table>

        <tr>
            <th>Course</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>

        {% for g in grades %}

        <tr>
            <td>{{ g.course.course_name }}</td>
            <td>{{ g.marks }}</td>
            <td>{{ g.grade }}</td>
        </tr>

        {% endfor %}

    </table>

    <a href="{% url 'student_dashboard' %}" class="back-btn">
        Back to Dashboard
    </a>

</div>
```

</body>

</html>
