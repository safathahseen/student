<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f5ff;
            min-height: 100vh;
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background-color: #e9ddff;
            border-bottom: 1px solid #d8c8f5;
        }

        .head h2 {
            color: #6b46c1;
            font-size: 28px;
        }

        .head span {
            color: #555;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            width: 500px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,.08);
        }

        h1 {
            color: #dc2626;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: #8b5cf6;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            transition: .3s;
        }

        .btn:hover {
            background: #7c3aed;
        }

        @media(max-width:768px) {

            .head {
                padding: 15px 20px;
            }

            .card {
                width: 100%;
            }
        }
    </style>

</head>

<body>

    <div class="head">
        <h2>SCMS</h2>
        <span>Access Denied</span>
    </div>

    <div class="container">

        <div class="card">

            <h1>Access Denied</h1>

            <p>
                You do not have permission to view this page.
            </p>

            <a href="{% url 'dashboard' %}" class="btn">
                Back to Dashboard
            </a>

        </div>

    </div>

</body>

</html>
