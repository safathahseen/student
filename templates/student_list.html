<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    ```
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f5ff;
            min-height: 100vh;
            color: #333;
        }

        /* Header */
        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background-color: #e9ddff;
            border-bottom: 1px solid #d8c8f5;
        }

        .head h2 {
            color: #6b46c1;
            font-size: 28px;
        }

        .head span {
            color: #555;
            font-size: 16px;
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.08);
        }

        h1 {
            color: #6b46c1;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Add Button */
        .add-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #8b5cf6;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .add-btn:hover {
            background-color: #7c3aed;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 8px;
        }

        th {
            background-color: #8b5cf6;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f3eeff;
        }

        /* Action Links */
        .edit-btn {
            text-decoration: none;
            color: #16a34a;
            font-weight: 600;
            margin-right: 10px;
        }

        .delete-btn {
            text-decoration: none;
            color: #dc2626;
            font-weight: 600;
        }

        .edit-btn:hover,
        .delete-btn:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media(max-width:768px) {

            .head {
                padding: 15px 20px;
            }

            .container {
                width: 95%;
                padding: 15px;
                overflow-x: auto;
            }

            table {
                min-width: 700px;
            }
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background: #8b5cf6;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 20px;
            transition: .3s;
        }

        .back-btn:hover {
            background: #7c3aed;
        }
    </style>
    ```

</head>

<body>

    ```
    <div class="head">
        <h2>SCMS</h2>
        <span>Student Records</span>
    </div>

    <div class="container">

        <h1>Student Records</h1>

        <a href="{% url 'add_student' %}" class="add-btn">
            Add Student
        </a>

        <table>

            <tr>
                <th>Name</th>
                <th>Department</th>
                <th>Semester</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>

            {% for student in students %}

            <tr>

                <td>{{ student.student.username }}</td>

                <td>{{ student.department }}</td>

                <td>{{ student.semester }}</td>

                <td>{{ student.phone }}</td>

                <td>

                    <a href="{% url 'edit_student' student.id %}" class="edit-btn">
                        Edit
                    </a>

                    <a href="{% url 'delete_student' student.id %}" class="delete-btn">
                        Delete
                    </a>

                </td>

            </tr>

            {% endfor %}

        </table>
        <a href="{% url 'admin_dashboard' %}" class="back-btn">
            Back to Dashboard
        </a>

    </div>


</body>

</html>
